services:
  # NOTE: bot.py is NOT in this compose file because it needs direct access to
  # the macOS CUPS socket via lpr, which doesn't work cleanly from inside a
  # Linux container (IPP version mismatch). Run bot.py natively on the Mac
  # with the printer attached — see the README for instructions.

  monitor-bot:
    build: .
    command: python3 monitor.py
    env_file: .env
    environment:
      LOG_FILE: /data/print_log.jsonl
      LOG_ARCHIVE_DIR: /data/logs
      SESSIONS_FILE: /data/.sessions
      INK_ALERT_FLAG: /data/.ink_alerted
    volumes:
      - ./:/data
    restart: unless-stopped

  gallery-bot:
    build: .
    command: python3 gallery.py
    env_file: .env
    environment:
      GALLERY_LOG_FILE: /data/gallery_log.jsonl
      GALLERY_SESSIONS_FILE: /data/.gallery_sessions
    volumes:
      - ./:/data
    restart: unless-stopped
